services:
  game-all-in-one:
    build:
      context: .
      dockerfile: dockerfile
    container_name: krhacken-gala-game
    restart: always
    env_file:
      - .env
    volumes:
      # On monte la base SQLite pour qu'elle persiste
      - ./krhacken_gala_26.db:/app/krhacken_gala_26.db
      # On monte le dossier images pour conserver les uploads de l'administration
      - ./images:/app/images
    networks:
      - caddy_net # Permet à ton conteneur Caddy global de le joindre

networks:
  caddy_net:
    external: true