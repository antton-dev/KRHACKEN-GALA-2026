<!DOCTYPE html>
<html lang="fr" data-theme="fantasy">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classement - Jeu des Célébrités</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
    <link rel="stylesheet" href="/static/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="/static/leaderboard.js" defer></script>
</head>
<body class="min-h-screen bg-base-200">
    <div class="min-h-screen flex items-center flex-col justify-center p-4">
        <div class="card w-full max-w-3xl bg-base-100 shadow-xl">
            <div class="card-body space-y-6">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <h2 class="text-3xl font-bold">🏆 Leaderboard</h2>
                    </div>
                    <button onclick="window.location.href='/'" class="btn btn-primary">Retour au jeu</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="table w-full">
                        <thead>
                            <tr>
                                <th>Rang</th>
                                <th>Joueur</th>
                                <th>Meilleur Score</th>
                            </tr>
                        </thead>
                        <tbody id="tableau-classement"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        
        <footer class="footer footer-center p-7">
            <p class="footer-title flex">Made by <a class="link" target="_blank" href="https://krhacken.org">Kr[HACK]en</a></p>
        </footer>
    </div>
</body>
</html>
